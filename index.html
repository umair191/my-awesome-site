<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Moments • m4havir vibes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }
    header {
      text-align: center;
      padding: 60px 20px 40px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
    }
    h1 {
      font-size: 3.2rem;
      margin-bottom: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .subtitle {
      font-size: 1.3rem;
      opacity: 0.8;
      max-width: 600px;
      margin: 0 auto;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 30px;
      padding: 40px 20px;
      max-width: 1400px;
      margin: 0 auto;
    }
    .card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }
    .card img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }
    .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
      text-align: center;
      font-size: 1.1rem;
      opacity: 0.95;
    }
    footer {
      text-align: center;
      padding: 40px 20px;
      font-size: 0.95rem;
      opacity: 0.7;
      border-top: 1px solid #222;
    }
    @media (max-width: 600px) {
      h1 { font-size: 2.4rem; }
      .gallery { gap: 20px; padding: 30px 15px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Your Moments</h1>
    <p class="subtitle">rain • passion • main tera vibes</p>
  </header>

  <section class="gallery">
    <div class="card">
      <img src="IMAGE_1_HERE.jpg" alt="Dancing couple in kitchen - Instagram reel style">
      <div class="caption">Passion in motion • Main Tera energy</div>
    </div>

    <div class="card">
      <img src="IMAGE_2_HERE.jpg" alt="Man in rain arms open dramatic portrait">
      <div class="caption">Letting it all go • Rain cleanse</div>
    </div>

    <div class="card">
      <img src="IMAGE_3_HERE.jpg" alt="Man in heavy rain emotional portrait">
      <div class="caption">Surrender • Feel everything</div>
    </div>
  </section>

  <footer>
    <p>Created with love • © 2026 • Inspired by @m4havir_ae</p>
  </footer>

</body>
</html>
